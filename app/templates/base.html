<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DOLAR PREDICTION — USD/IDR Prediction Engine{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #04040a;
      --surface:   #080812;
      --card:      #0d0d1c;
      --card2:     #111128;
      --border:    #1e1e38;
      --border2:   #252540;
      --accent:    #6366f1;
      --accent2:   #818cf8;
      --accent3:   #a5b4fc;
      --emerald:   #10b981;
      --amber:     #f59e0b;
      --rose:      #f43f5e;
      --sky:       #38bdf8;
      --text:      #e2e2f0;
      --muted:     #6b6b90;
      --muted2:    #4a4a68;
      --mono:      'JetBrains Mono', 'DM Mono', monospace;
      --sans:      'Plus Jakarta Sans', 'Satoshi', sans-serif;
      --display:   'Plus Jakarta Sans', sans-serif;
      --radius:    14px;
      --radius-sm: 8px;
      --glow:      0 0 40px rgba(99,102,241,.15);
      --glow-sm:   0 0 20px rgba(99,102,241,.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Background grid + glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,.07) 0%, transparent 70%);
      top: -200px; right: -200px;
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(4,4,10,.8);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-brand {
      font-family: var(--display);
      font-size: .95rem; font-weight: 800; letter-spacing: -.03em;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: .6rem;
    }
    .nav-brand .brand-icon {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: .85rem;
    }
    .nav-brand .brand-text { color: var(--accent3); }
    .nav-links { display: flex; gap: .25rem; list-style: none; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: .8rem;
      font-weight: 600; letter-spacing: .03em;
      padding: .4rem .85rem; border-radius: 6px;
      transition: all .2s;
    }
    .nav-links a:hover  { color: var(--text); background: rgba(255,255,255,.05); }
    .nav-links a.active { color: var(--accent2); background: rgba(99,102,241,.1); }
    .nav-badge {
      display: inline-flex; align-items: center; gap: .3rem;
      background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.25);
      color: var(--emerald); border-radius: 20px;
      padding: .2rem .65rem; font-size: .7rem; font-weight: 700;
      letter-spacing: .05em; font-family: var(--mono);
    }
    .nav-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--emerald); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Main ── */
    main {
      flex: 1; position: relative; z-index: 1;
      padding: 3rem 2.5rem;
      max-width: 1280px; margin: 0 auto; width: 100%;
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      position: relative; overflow: hidden;
      transition: border-color .25s, box-shadow .25s;
    }
    .card:hover { border-color: var(--border2); box-shadow: var(--glow-sm); }
    .card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(99,102,241,.03) 0%, transparent 60%);
      pointer-events: none;
    }
    .card-label {
      font-size: .65rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: .5rem;
    }
    .card-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .7rem 1.6rem; border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      font-family: var(--sans); font-size: .85rem; font-weight: 700;
      letter-spacing: .02em; text-decoration: none;
      transition: all .2s; position: relative; overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      color: #fff; box-shadow: 0 4px 20px rgba(99,102,241,.35);
    }
    .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 28px rgba(99,102,241,.45); }
    .btn-primary:active { transform: translateY(0); }
    .btn-outline {
      background: transparent; color: var(--accent2);
      border: 1px solid rgba(99,102,241,.35);
    }
    .btn-outline:hover { background: rgba(99,102,241,.08); border-color: var(--accent); }
    .btn-ghost {
      background: rgba(255,255,255,.05); color: var(--text); border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.09); }

    /* ── Tables ── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
    table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: .82rem; }
    thead { background: rgba(99,102,241,.06); }
    th {
      color: var(--muted); text-align: left;
      padding: .75rem 1rem; font-size: .65rem;
      letter-spacing: .15em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: .75rem 1rem;
      border-bottom: 1px solid rgba(30,30,56,.7);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(99,102,241,.03); }

    /* ── Badges ── */
    .badge {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .2rem .65rem; border-radius: 20px;
      font-size: .68rem; font-weight: 700; letter-spacing: .06em;
      font-family: var(--mono);
    }
    .badge-indigo  { background: rgba(99,102,241,.15); color: var(--accent2); border: 1px solid rgba(99,102,241,.2); }
    .badge-green   { background: rgba(16,185,129,.12); color: var(--emerald);  border: 1px solid rgba(16,185,129,.2); }
    .badge-amber   { background: rgba(245,158,11,.12); color: var(--amber);    border: 1px solid rgba(245,158,11,.2); }
    .badge-rose    { background: rgba(244,63,94,.12);  color: var(--rose);     border: 1px solid rgba(244,63,94,.2); }
    .badge-sky     { background: rgba(56,189,248,.12); color: var(--sky);      border: 1px solid rgba(56,189,248,.2); }

    /* ── Alert ── */
    .alert {
      padding: 1rem 1.25rem; border-radius: var(--radius-sm);
      margin-bottom: 1.5rem; font-size: .875rem; display: flex; align-items: flex-start; gap: .75rem;
    }
    .alert-error   { background: rgba(244,63,94,.08);  border: 1px solid rgba(244,63,94,.25);  color: #fb7185; }
    .alert-success { background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.25); color: var(--emerald); }
    .alert-info    { background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.25); color: var(--accent3); }
    .alert-warning { background: rgba(245,158,11,.08); border: 1px solid rgba(245,158,11,.25); color: var(--amber); }

    /* ── Page header ── */
    .page-header { margin-bottom: 2.5rem; }
    .page-header .eyebrow {
      font-size: .7rem; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; color: var(--accent); margin-bottom: .6rem;
      font-family: var(--mono);
    }
    .page-header h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -.03em; line-height: 1.15; }
    .page-header p  { color: var(--muted); margin-top: .5rem; font-size: .95rem; line-height: 1.65; }

    /* ── Utility ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.25rem; }
    .mt-1 { margin-top: .5rem; }  .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; } .mt-4 { margin-top: 2.5rem; }
    .text-accent  { color: var(--accent2); }
    .text-muted   { color: var(--muted); font-size: .85rem; }
    .text-mono    { font-family: var(--mono); }
    .text-center  { text-align: center; }
    .text-emerald { color: var(--emerald); }
    .text-amber   { color: var(--amber); }
    .text-rose    { color: var(--rose); }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid var(--border);
      padding: 1.5rem 2.5rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
      color: var(--muted); font-size: .75rem; font-family: var(--mono);
    }
    .footer-brand { color: var(--accent2); font-weight: 600; }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { color: var(--muted); text-decoration: none; transition: color .2s; }
    .footer-links a:hover { color: var(--text); }

    /* ── Loading shimmer ── */
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .shimmer {
      background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      main { padding: 1.75rem 1.25rem; }
      nav  { padding: 0 1.25rem; }
      footer { flex-direction: column; text-align: center; }
      .nav-badge { display: none; }
    }
    @media (max-width: 480px) {
      .nav-links { gap: 0; }
      .nav-links a { padding: .4rem .5rem; font-size: .75rem; }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="/">
      <span class="brand-icon">₿</span>
      <span>THE DOLAR PREDICTION <span class="brand-text">·</span> USD/IDR</span>
    </a>
    <ul class="nav-links">
      <li><a href="/" {% if request.endpoint=='index' %}class="active"{% endif %}>Dashboard</a></li>
      <li><a href="/predict" {% if request.endpoint=='predict' %}class="active"{% endif %}>Prediksi</a></li>
      <li><a href="/compare" {% if request.endpoint=='compare' %}class="active"{% endif %}>Komparasi</a></li>
      <li><a href="/about" {% if request.endpoint=='about' %}class="active"{% endif %}>Tentang</a></li>
    </ul>
    <span class="nav-badge">5 Models Live</span>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer>
    <span><span class="footer-brand">DOLAR PREDICTION</span> — Kecerdasan Buatan &copy; 2026</span>
    <div class="footer-links">
      <a href="/api/status">API Status</a>
      <a href="/compare">Model Metrics</a>
      <a href="/about">Tentang</a>
    </div>
    <span style="font-family:var(--mono);font-size:.7rem;color:var(--muted2)">Flask · TensorFlow · scikit-learn</span>
  </footer>
</body>
</html>
